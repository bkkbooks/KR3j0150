body:
  text: 胡文穆雜著雜家類三雜説之屬提要臣等謹案胡文穆雜著一卷明胡廣撰廣字光大吉水人建文庚辰進士第一惠帝以其名與漢胡廣同更名靖除翰林院修撰靖難兵至迎降永樂初復原名纍官文淵閣大學士贈少師諡文穆事迹具明史本傳所著有晃菴扈從諸集此書乃其隨手劄記已載入文穆集中此其别行之本也其中如謂資治通鑑論維州悉怛謀事司馬光非不知李是牛非特以意主和鄰不欲生釁故矯為此言引其臨終與吕公著簡為證可謂深明時勢又謂灞陵尉禁人夜行乃其本職李廣憾之為私意謂子産論黃熊為啓信妄喜怪之漸謂申屠嘉大節凜然班固稱其學術不及陳平其説非是持論亦正他如謂易卦吉凶皆戒占者當反求諸己與左傳穆薑南蒯之事合謂問名納吉納幣之卜皆卜其日非卜吉凶程子所疑未可憑謂李白非無與杜甫詩容齋隨筆所考未確謂灌嬰實定豫章李白詩不誤而胡若思指為陳嬰反誤亦頗有考據廣文集未足名家而此書在明初説部之中猶為可取者至論季布不死一條謂班固之言抑揚太過與其負王艮而迎成祖截然相反豈書作于建文壬午以前耶然論漢黃生宋蘇軾武王非聖人之説又似曲為靖難解者或自知大節有虧而故為成仁取義之言以掩後世之耳目歟乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:982653a9cd3b941b23796a17eba8b07f528429c69ba57a457ec2b6c9f28ea4c3
